<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple List</title>
</head>
<style>
li {
  cursor: pointer;
}
body {
  display: flex;
}
div {
  width: 100%;
}
#log {
  border: 1px solid black;
}
</style>
<body>
  <div><ul id="list"></ul></div>
  <div id="root"></div>
  <div id="logs">Logs:</div>
</body>
<script>
const logs = document.getElementById("logs");
const root = document.getElementById("root");

let controller = null;

async function start(i, signal) {
  var p = logs.appendChild(document.createElement("p"));
  p.innerText = `started async job for ${i}`;
  await new Promise(r => setTimeout(r, 2000));
  p = logs.appendChild(document.createElement("p"));
  p.innerText = `finished ${i}, ${signal.aborted ? 'skipping render' : 'rendering'}`;
  if (signal.aborted) return;
  p = document.createElement("p");
  p.innerText = `render ${i}`;
  root.replaceChildren(p);
}

const ul = document.getElementById("list");
for (let i=0; i<3; i++) {
  const li = ul.appendChild(document.createElement("li"));
  li.textContent = `ITEM ${i}`;
  li.onclick = (e) => {
    if (controller) controller.abort();
    controller = new AbortController();
    for (const c of ul.children) c.style = "";
    e.currentTarget.style = "color: blue;";
    start(i, controller.signal);
  }
}
</script>
</html>
