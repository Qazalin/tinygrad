<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Adjacency List — Reference Impl</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#08090e;color:#f0f0f5;font:14px/1.4 system-ui,sans-serif}
  ul.tree,.tree ul{list-style:none;padding:0;white-space:nowrap;cursor:pointer}
  .tree li{padding:2px 6px;outline:none}
  .tree li:focus{background:#1e2029;border-radius:6px}
  .tree li>.label{display:inline-flex;align-items:center;gap:6px}
  .tree li.has-children>.label::before{
    content:"▸";
    display:inline-block;
    width:1.2em;
    font-size:1.2em;        /* bigger arrow */
    line-height:1;
    text-align:center;
    color:#a0a1ad;
    transform:rotate(0deg);
  }
  .tree li.expanded>.label::before{
    transform:rotate(90deg);
    color:#f0f0f5;
  }
  .tree li>ul{display:none;margin-top:4px;padding-left:16px;border-left:1px solid #4a4b57}
  .tree li.expanded>ul{display:block}
  .count{color:#a0a1ad;font-size:.85em}
</style>
</head>
<body>

<ul id="tree" class="tree" role="tree" aria-label="Adjacency List"></ul>

<script>
const adj = {
  "A": ["A1","A2","A3"],
  "A2": ["A2a","A2b"],
  "A2b": ["A2b-i","A2b-ii"],
  "B": ["B1","B2"],
  "C": []
}

const firstChild   = li => li.querySelector(":scope > ul > li")
const lastChild    = li => li.querySelector(":scope > ul > li:last-child")
const parentItem   = li => li.parentElement.closest("li")
const isExpanded   = li => li.classList.contains("expanded")
const isFirstChild = li => !li.previousElementSibling
const childCount   = label => (adj[label]?.length || 0)

function focus(to, from) {
  if (!to) return
  from?.setAttribute("tabindex","-1")
  to.setAttribute("tabindex","0")
  to.focus()
}

function toggle(li) {
  if (li.classList.contains("has-children")) li.classList.toggle("expanded")
}

function render(label, parent) {
  const li = document.createElement("li")
  li.setAttribute("role","treeitem")

  const span = document.createElement("span")
  span.className = "label"
  span.textContent = label

  const count = childCount(label)
  if (count) {
    const c = document.createElement("span")
    c.className = "count"
    c.textContent = `(${count})`
    span.appendChild(c)
    li.classList.add("has-children")
  }

  li.appendChild(span)

  if (count) {
    const ul = document.createElement("ul")
    adj[label].forEach(x => render(x, ul))
    li.appendChild(ul)
  }

  parent.appendChild(li)
}
// build roots
const root = document.getElementById("tree")
const allChildren = new Set(Object.values(adj).flat())
Object.keys(adj).forEach(k => { if (!allChildren.has(k)) render(k, root) })

// initial focus
const first = root.querySelector("li"); //if (first) { first.tabIndex = 0; first.focus() }

// click: focus + toggle (no-op for leaves)
root.addEventListener("click", e => {
  const li = e.target.closest("[role=treeitem]"); if (!li) return
  focus(li, document.activeElement.closest("li"))
  toggle(li)
})

// keyboard
root.addEventListener("keydown", e => {
  const li = document.activeElement?.closest("li"); if (!li) return

  // Enter → toggle expand/collapse
  if (e.key === "Enter") { e.preventDefault(); toggle(li) }

  // ArrowDown → if expanded then first child; else next sibling; else no-op
  if (e.key === "ArrowDown") {
    e.preventDefault()
    if (isExpanded(li) && firstChild(li)) return focus(firstChild(li), li)
    if (li.nextElementSibling) return focus(li.nextElementSibling, li)
  }

  // ArrowUp → if first child then parent; else previous sibling; else no-op
  if (e.key === "ArrowUp") {
    e.preventDefault()
    if (parentItem(li) && isFirstChild(li)) return focus(parentItem(li), li)
    if (li.previousElementSibling) return focus(li.previousElementSibling, li)
  }
})
</script>
</body>
</html>
